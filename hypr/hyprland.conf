# ── Monitor ──────────────────────────────────────────────
monitor=,1920x1080@60,auto,1

# ── Environment Variables ────────────────────────────────
env = XCURSOR_THEME,macOS
env = XCURSOR_SIZE,24

# ── Autostart ────────────────────────────────────────────
exec-once = hyprctl setcursor macOS 24
exec-once = waypaper --restore
exec-once = waybar
exec-once = ags run /home/aryan/.config/ags/app.ts
exec-once = dunst
exec-once = playerctld daemon
exec-once = swaync
exec-once = nm-applet --indicator

# ── Catppuccin Mocha Colors ───────────────────────────────
$base     = #101010
$mantle   = #1a1a1a
$crust    = #0a0a0a
$text     = #f5e0dc
$primary  = #f38ba8
$secondary= #fab387
$surface0 = #222222

# ── General ───────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 0
    layout = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding = 12
    blur {
        size = 8
        passes = 3
        noise = 0.02
        contrast = 0.9
        brightness = 0.8
        new_optimizations = true
        xray = true
    }
}
# ── Animations ────────────────────────────────────────────
animations {
    enabled = true

    bezier = fluid,  0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.36,  0,   0.66, -0.56
    bezier = smoothIn,  0.25, 1, 0.5, 1

    animation = windows,          1, 4, fluid,  slide
    animation = windowsOut,       1, 4, fluid, slide
    animation = windowsMove,      1, 4, fluid
    animation = fade,             1, 5, smoothIn
    animation = fadeOut,          1, 5, smoothOut
    animation = workspaces,       1, 4, fluid,  slide
    animation = specialWorkspace, 1, 4, fluid,  slidevert
}

layerrule = blur on, match:namespace ags-control-panel
layerrule = ignore_alpha 0.5, match:namespace ags-control-panel

# ── Input ─────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# ── Layout ────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    force_split = 2
}

# ── Misc ──────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    vfr = false
}

# ── Window Rules ──────────────────────────────────────────
windowrule = opacity 0.95, match:class ^(Code)$
windowrule = opacity 0.95, match:class ^(code-url-handler)$
windowrule = opacity 1.0,  match:class ^(firefox)$
windowrule = float 1,      match:class ^(pavucontrol)$
windowrule {
  name = windowrule-1
  opacity = 0.85 override 0.85 override
  match:class = ^(kitty)$
}

windowrule {
  name = windowrule-2
  opacity = 1
  match:title = ^(neovim)$
}


windowrule {
  name = windowrule-1
  float = on
  size = 400 500
  move = ((monitor_w*1)-410) (40)
  match:class = ^(nm-connection-editor)$
}


windowrule {
  name = windowrule-2
  float = on
  size = 400 500
  move = ((monitor_w*1)-410) (40)
  match:class = ^(blueman-manager)$
}

# ── Keybinds ──────────────────────────────────────────────
$mod = SUPER

bind = $mod,       Return, exec, kitty
bind = $mod,       Q,      killactive
bind = $mod,       E,      exec, thunar
bind = $mod,       D,      exec, rofi -show drun
bind = $mod,       F,      fullscreen 
bind = $mod,       V,      togglefloating
bind = $mod SHIFT, M,      exit
bind = $mod SHIFT, R,      exec, hyprctl reload
bind = $mod      , L,        exec, hyprlock
bind = $mod, B, exec, /opt/zen/zen
bind = $mod, M, exec, chromium --app=https://music.apple.com
bind = $mod, W, exec, waypaper

# ── Screenshot ────────────────────────────────────────────
bind = ,      Print, exec, grim ~/Pictures/screenshot_$(date +%s).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%s).png

# ── Volume & Brightness ───────────────────────────────────
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Focus ─────────────────────────────────────────────────
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# ── Move Windows ──────────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ── Workspaces ────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# ── Mouse ─────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
