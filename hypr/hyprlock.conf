general {
    immediate_render = true
}

background {
    monitor =
    path = $HOME/Pictures/lock-screen.png
    blur_passes = 2
    blur_size = 4
    brightness = 0.75
    contrast = 0.9
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(255, 255, 255, 0.70)
    font_size = 16
    font_family = Inter Variable
    position = 0, 450
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.92)
    font_size = 86
    font_family = Inter Variable
    position = 0, 370
    halign = center
    valign = center
}

# Profile picture
image {
    monitor =
    path = $HOME/Pictures/pfp.png
    size = 72
    rounding = -1
    border_size = 0
    position = 0, -350
    halign = center
    valign = center
}

# Name
label {
    monitor =
    text = Aryan Sharma
    color = rgba(255, 255, 255, 0.85)
    font_size = 13
    font_family = Inter Variable
    position = 0, -420
    halign = center
    valign = center
}

# Password input — subtle text below name
input-field {
    monitor =
    size = 220, 28
    outline_thickness = 0
    dots_size = 0.20
    dots_spacing = 0.45
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.0)
    inner_color = rgba(255, 255, 255, 0.0)
    font_color = rgba(255, 255, 255, 0.55)
    fade_on_empty = false
    placeholder_text = <i>Enter Password</i>
    hide_input = false
    check_color = rgba(255, 255, 255, 0.4)
    fail_color = rgba(220, 80, 80, 0.8)
    fail_text = incorrect
    fail_transition = 200
    rounding = 0
    position = 0, -450
    halign = center
    valign = center
}
