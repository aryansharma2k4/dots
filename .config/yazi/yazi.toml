[mgr]
ratio = [ 1, 3, 5 ]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = true
linemode = "mtime"
show_hidden = false
show_symlink = true
scrolloff = 8
mouse_events = [ "click", "scroll" ]

[preview]
wrap = "yes"
tab_size = 2
max_width = 1800
max_height = 1400
image_delay = 20
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
	{ run = "$EDITOR %s", block = true, for = "unix" },
]
open = [
	{ run = "xdg-open %s", desc = "Open", orphan = true, for = "linux" },
]
play = [
	{ run = "xdg-open %s", orphan = true, for = "linux" },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = "edit" },
	{ url = "*.md", use = "edit" },
	{ mime = "{audio,video}/*", use = "play" },
]
